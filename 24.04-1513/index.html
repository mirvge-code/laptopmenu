<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Кофейня">
  <link rel="manifest" href="manifest.json">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
  <title>Электронное меню</title>
  <style>
    :root {
      --black: #111111;
      --dark: #1e1e1e;
      --card: #252525;
      --card2: #2c2c2c;
      --border: #3a3a3a;
      --yellow: #f5c842;
      --yellow-dim: #c9a030;
      --yellow-bg: rgba(245, 200, 66, 0.12);
      --text: #f0ece0;
      --text-muted: #a09880;
      --text-dim: #6b6452;
      --danger: #e05050;
      --success: #4caf7a;
      --radius: 14px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      background: var(--dark);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo .cup {
      font-size: 26px;
      display: inline-block;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
    }

    .header-logo .cup.animating {
      transform: scale(0.5) rotate(-30deg);
      opacity: 0;
    }

    .header-logo .name {
      font-size: 20px;
      font-weight: 700;
      color: var(--yellow);
      letter-spacing: 0.5px;
    }

    .header-logo .sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-mode {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-mode:hover {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    .btn-mode.active {
      background: var(--yellow);
      color: var(--black);
      border-color: var(--yellow);
      font-weight: 600;
    }

    .btn-mode .icon {
      font-size: 15px;
    }

    /* CATEGORY TABS */
    .tabs-wrap {
      background: var(--dark);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tabs-wrap::-webkit-scrollbar {
      display: none;
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 10px 16px;
      min-width: max-content;
    }

    .tab {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .tab:hover {
      border-color: var(--yellow-dim);
      color: var(--text);
    }

    .tab.active {
      background: var(--yellow);
      color: var(--black);
      border-color: var(--yellow);
      font-weight: 600;
    }

    .tab-add-btn {
      padding: 8px 14px;
      border-radius: 20px;
      border: 1.5px dashed var(--border);
      background: transparent;
      color: var(--yellow);
      font-size: 18px;
      cursor: pointer;
      transition: all .2s;
      line-height: 1;
    }

    .tab-add-btn:hover {
      border-color: var(--yellow);
      background: var(--yellow-bg);
    }

    /* MAIN CONTENT */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .main::-webkit-scrollbar {
      width: 4px;
    }

    .main::-webkit-scrollbar-track {
      background: transparent;
    }

    .main::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* MENU GRID */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    /* MENU CARD */
    .menu-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform .15s, border-color .15s;
      position: relative;
      cursor: default;
    }

    body:not(.edit-mode) .menu-card {
      cursor: pointer;
    }

    .menu-card:hover {
      transform: translateY(-2px);
      border-color: var(--border);
    }

    .menu-card .card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: var(--card2);
    }

    .menu-card .card-img-placeholder {
      width: 100%;
      height: 180px;
      background: var(--card2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: var(--text-dim);
    }

    .menu-card .card-body {
      padding: 14px 16px 16px;
    }

    .menu-card .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .menu-card .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 12px;
      min-height: 38px;
    }

    .menu-card .card-price {
      font-size: 20px;
      font-weight: 700;
      color: var(--yellow);
    }

    .menu-card .card-price span {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-dim);
      margin-left: 2px;
    }

    /* EDIT OVERLAY ON CARD */
    .card-edit-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: none;
      gap: 6px;
    }

    .edit-mode .menu-card .card-edit-actions {
      display: flex;
    }

    .card-edit-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: transform .15s;
    }

    .card-edit-btn:hover {
      transform: scale(1.1);
    }

    .btn-edit-item {
      background: var(--yellow);
      color: var(--black);
    }

    .btn-delete-item {
      background: var(--danger);
      color: white;
    }

    /* ADD CARD */
    .card-add {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all .2s;
      color: var(--text-muted);
    }

    .card-add:hover {
      border-color: var(--yellow);
      color: var(--yellow);
      background: var(--yellow-bg);
    }

    .card-add .plus {
      font-size: 36px;
      line-height: 1;
    }

    .card-add .label {
      font-size: 14px;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-state .emoji {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 16px;
      margin-bottom: 8px;
    }

    /* MODAL OVERLAY */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--dark);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 500px;
      max-height: 97vh;
      overflow-y: auto;
      transform: scale(0.96);
      transition: transform .2s;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .modal-overlay.open .modal {
      transform: scale(1);
    }

    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--yellow);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .modal-close:hover {
      background: var(--card);
      color: var(--text);
    }

    .modal-body {
      padding: 20px 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: block;
      letter-spacing: 0.3px;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
      transition: border-color .15s;
      font-family: inherit;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--yellow);
    }

    .form-textarea {
      height: 80px;
      resize: vertical;
    }

    /* IMAGE UPLOAD */
    .img-upload-area {
      width: 100%;
      height: 160px;
      background: var(--card);
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      gap: 8px;
      transition: all .15s;
      overflow: hidden;
      position: relative;
    }

    .img-upload-area:hover {
      border-color: var(--yellow);
    }

    .img-upload-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    .img-upload-area .upload-hint {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .img-upload-area.has-img .upload-hint {
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 14px;
      border-radius: 20px;
    }

    .img-upload-area .upload-icon {
      font-size: 28px;
    }

    .img-upload-area .upload-text {
      font-size: 13px;
      color: var(--text-muted);
    }

    input[type=file] {
      display: none;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* BUTTONS */
    .btn {
      padding: 10px 22px;
      border-radius: 20px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--yellow);
      color: var(--black);
    }

    .btn-primary:hover {
      background: #e6bc3a;
    }

    .btn-secondary {
      background: var(--card);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger);
      color: white;
    }

    /* CONFIRM MODAL */
    .confirm-modal {
      max-width: 360px;
    }

    .confirm-icon {
      font-size: 40px;
      text-align: center;
      margin-bottom: 12px;
    }

    .confirm-text {
      font-size: 16px;
      color: var(--text);
      text-align: center;
      margin-bottom: 6px;
    }

    .confirm-sub {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }

    /* CATEGORY EDIT MODAL */
    .cat-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .cat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      border: 1px solid var(--border);
    }

    .cat-item input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
    }

    .cat-item input:focus {
      outline: none;
    }

    .cat-del {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
    }

    .cat-del:hover {
      color: var(--danger);
    }

    /* ADMIN PIN */
    .pin-dots {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin: 20px 0;
    }

    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--border);
      transition: all .15s;
    }

    .pin-dot.filled {
      background: var(--yellow);
      border-color: var(--yellow);
    }

    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 260px;
      margin: 0 auto;
    }

    .pin-key {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 22px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pin-key:hover {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    .pin-key:active {
      transform: scale(0.94);
    }

    .pin-error {
      color: var(--danger);
      text-align: center;
      font-size: 13px;
      margin-top: 10px;
      min-height: 20px;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 14px;
      color: var(--text);
      transition: transform .3s;
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      border-color: var(--success);
      color: var(--success);
    }

    .toast.error {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* BADGE MODE INDICATOR */
    .mode-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .mode-badge.view {
      background: rgba(80, 180, 120, 0.15);
      color: var(--success);
      border: 1px solid rgba(80, 180, 120, 0.3);
    }

    .mode-badge.edit {
      background: var(--yellow-bg);
      color: var(--yellow);
      border: 1px solid rgba(245, 200, 66, 0.3);
    }

    /* SCROLL TO TOP BTN */
    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      z-index: 50;
    }

    .scroll-top.visible {
      display: flex;
    }

    .scroll-top:hover {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    /* ===== МОДИФИКАТОРЫ — ПРОСМОТР ===== */
    .mod-section {
      padding: 0 44px 36px;
      text-align: left;
    }

    .mod-group {
      margin-bottom: 20px;
    }

    .mod-group-label {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mod-group-label .req-badge {
      font-size: 10px;
      background: var(--yellow-bg);
      color: var(--yellow);
      border: 1px solid rgba(245, 200, 66, .3);
      border-radius: 6px;
      padding: 1px 6px;
      text-transform: none;
      letter-spacing: 0;
    }

    .mod-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .mod-chip {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: all .15s;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mod-chip:hover {
      border-color: var(--yellow-dim);
    }

    .mod-chip.selected {
      background: var(--yellow);
      color: var(--black);
      border-color: var(--yellow);
      font-weight: 600;
    }

    .mod-chip .chip-price {
      font-size: 12px;
      opacity: .75;
    }

    .mod-chip.selected .chip-price {
      opacity: .8;
    }

    .detail-price-wrap {
      padding: 0 44px 36px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
      padding-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .detail-total-label {
      font-size: 14px;
      color: var(--text-muted);
    }

    .detail-total-price {
      font-size: 36px;
      font-weight: 700;
      color: var(--yellow);
      transition: color .2s;
    }

    /* ===== МОДИФИКАТОРЫ — РЕДАКТОР ===== */
    .mod-editor {
      margin-top: 4px;
    }

    .mod-editor-group {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .mod-editor-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .mod-editor-group-header input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      padding: 4px 0;
      font-family: inherit;
    }

    .mod-editor-group-header input:focus {
      outline: none;
      border-color: var(--yellow);
    }

    .mod-type-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .mod-type-btn {
      padding: 4px 10px;
      font-size: 11px;
      background: transparent;
      color: var(--text-muted);
      border: none;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .mod-type-btn.active {
      background: var(--yellow);
      color: var(--black);
      font-weight: 600;
    }

    .mod-req-toggle {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      transition: all .15s;
      white-space: nowrap;
    }

    .mod-req-toggle.on {
      background: var(--yellow-bg);
      color: var(--yellow);
      border-color: rgba(245, 200, 66, .3);
    }

    .mod-del-group {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    .mod-del-group:hover {
      color: var(--danger);
    }

    .mod-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .mod-option-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mod-option-row input[type=text] {
      flex: 1;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      padding: 7px 10px;
      font-family: inherit;
    }

    .mod-option-row input[type=number] {
      width: 80px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      padding: 7px 10px;
      font-family: inherit;
    }

    .mod-option-row input:focus {
      outline: none;
      border-color: var(--yellow);
    }

    .mod-del-opt {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    .mod-del-opt:hover {
      color: var(--danger);
    }

    .mod-add-opt {
      margin-top: 8px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      color: var(--yellow);
      font-size: 13px;
      cursor: pointer;
      padding: 6px;
      width: 100%;
      transition: all .15s;
    }

    .mod-add-opt:hover {
      border-color: var(--yellow);
      background: var(--yellow-bg);
    }

    .mod-add-group-btn {
      width: 100%;
      background: transparent;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      color: var(--yellow);
      font-size: 14px;
      cursor: pointer;
      padding: 10px;
      margin-top: 4px;
      transition: all .15s;
    }

    .mod-add-group-btn:hover {
      border-color: var(--yellow);
      background: var(--yellow-bg);
    }

    /* Планшет — модификаторы */
    @media (min-width: 601px) and (max-width: 1024px) {
      .mod-section {
        padding: 0 28px 28px;
      }

      .detail-price-wrap {
        padding: 20px 28px 28px;
      }

      .detail-total-price {
        font-size: 28px;
      }
    }

    @media (max-width: 600px) {
      .mod-section {
        padding: 0 16px 20px;
      }

      .detail-price-wrap {
        padding: 16px 16px 20px;
      }

      .detail-total-price {
        font-size: 24px;
      }
    }


    @media (min-width: 601px) and (max-width: 1024px) {

      /* Хедер */
      .header {
        height: 72px;
        padding: 0 24px;
      }

      .header-logo .cup {
        font-size: 30px;
      }

      .header-logo .name {
        font-size: 22px;
      }

      .header-logo .sub {
        font-size: 12px;
      }

      .btn-mode {
        padding: 10px 20px;
        font-size: 15px;
      }

      .btn-mode .icon {
        font-size: 17px;
      }

      /* Табы категорий */
      .tabs {
        padding: 12px 20px;
        gap: 6px;
      }

      .tab {
        padding: 10px 22px;
        font-size: 16px;
      }

      /* Основная сетка */
      .main {
        padding: 24px;
      }

      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 20px;
      }

      /* Карточки */
      .menu-card .card-img,
      .menu-card .card-img-placeholder {
        height: 220px;
      }

      .menu-card .card-img-placeholder {
        font-size: 60px;
      }

      .menu-card .card-body {
        padding: 16px 20px 20px;
      }

      .menu-card .card-title {
        font-size: 18px;
        margin-bottom: 8px;
      }

      .menu-card .card-desc {
        font-size: 14px;
        margin-bottom: 14px;
        min-height: 42px;
      }

      .menu-card .card-price {
        font-size: 22px;
      }

      .card-edit-btn {
        width: 38px;
        height: 38px;
        font-size: 16px;
      }

      /* Модальные окна (общие) */
      .modal-overlay {
        padding: 24px;
      }

      .modal {
        max-width: 680px;
        max-height: 96vh;
      }

      .modal-header {
        padding: 22px 28px 18px;
      }

      .modal-title {
        font-size: 20px;
      }

      .modal-close {
        width: 38px;
        height: 38px;
        font-size: 20px;
      }

      .modal-body {
        padding: 22px 28px;
      }

      .modal-footer {
        padding: 18px 28px;
      }

      .form-label {
        font-size: 15px;
        margin-bottom: 8px;
      }

      .form-input,
      .form-textarea {
        font-size: 17px;
        padding: 13px 16px;
      }

      .form-textarea {
        height: 100px;
      }

      .img-upload-area {
        height: 200px;
      }

      .img-upload-area .upload-icon {
        font-size: 36px;
      }

      .img-upload-area .upload-text {
        font-size: 15px;
      }

      /* Кнопки */
      .btn {
        padding: 13px 28px;
        font-size: 16px;
      }

      /* Модальное окно блюда */
      #detail-modal .modal {
        max-width: 720px !important;
      }

      #detail-img {
        max-height: 520px !important;
      }

      #detail-placeholder {
        height: 380px !important;
        font-size: 80px !important;
      }

      #detail-desc {
        font-size: 17px !important;
        line-height: 1.65 !important;
        margin-bottom: 18px !important;
      }

      #detail-price {
        font-size: 28px !important;
      }

      /* PIN клавиатура */
      .pin-keypad {
        max-width: 300px;
        gap: 14px;
      }

      .pin-key {
        font-size: 26px;
      }

      .pin-dot {
        width: 16px;
        height: 16px;
      }

      /* Toast */
      .toast {
        font-size: 16px;
        padding: 13px 26px;
      }

      /* Scroll top */
      .scroll-top {
        width: 52px;
        height: 52px;
        font-size: 22px;
        bottom: 28px;
        right: 28px;
      }
    }

    /* ===== МОБИЛЬНЫЕ (≤600px) ===== */
    @media (max-width: 600px) {
      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
      }

      .header {
        padding: 0 14px;
      }

      .header-logo .name {
        font-size: 17px;
      }

      .main {
        padding: 14px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">
      <span class="cup" id="header-cup">☕</span>
      <div>
        <div class="name" id="cafe-name">Кофейня</div>
        <div class="sub">Меню</div>
      </div>
    </div>
    <div class="header-actions">
      <span class="mode-badge" id="mode-badge">Просмотр</span>
      <button class="btn-mode" id="btn-view-mode" onclick="switchMode('view')">
        <span class="icon">👁</span> Меню
      </button>
      <button class="btn-mode" id="btn-edit-mode" onclick="requestEditMode()">
        <span class="icon">✏️</span> Редактор
      </button>
    </div>
  </div>

  <!-- CATEGORY TABS -->
  <div class="tabs-wrap">
    <div class="tabs" id="tabs-container">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main" id="main-content">
    <div class="menu-grid" id="menu-grid">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- SCROLL TOP -->
  <button class="scroll-top" id="scroll-top-btn" onclick="scrollToTop()">↑</button>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ===== MODALS ===== -->

  <!-- DETAIL MODAL -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal" style="max-width: 1100px;">
      <div class="modal-header">
        <span class="modal-title" id="detail-modal-title"></span>
        <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
      </div>
      <div class="modal-body" style="padding: 0; text-align: center;">
        <img id="detail-img" src="" style="width: 100%; max-height: 820px; object-fit: cover; display: none;">
        <div id="detail-placeholder"
          style="width: 100%; height: 580px; display: none; align-items: center; justify-content: center; font-size: 120px; background: var(--card2); color: var(--text-dim);">
        </div>
        <div style="padding: 36px 44px 24px;">
          <div id="detail-desc"
            style="font-size: 19px; color: var(--text-muted); line-height: 1.7; margin-bottom: 0; text-align: left;">
          </div>
        </div>
        <div id="detail-mods" class="mod-section"></div>
        <div class="detail-price-wrap">
          <span class="detail-total-label">Итого</span>
          <div id="detail-total" class="detail-total-price"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PIN MODAL -->
  <div class="modal-overlay" id="pin-modal">
    <div class="modal confirm-modal">
      <div class="modal-header">
        <span class="modal-title">🔐 Режим редактора</span>
        <button class="modal-close" onclick="closeModal('pin-modal')">✕</button>
      </div>
      <div class="modal-body">
        <p style="text-align:center;color:var(--text-muted);font-size:14px;margin-bottom:4px;">Введите PIN-код
          администратора</p>
        <p style="text-align:center;color:var(--text-dim);font-size:12px;margin-bottom:0;">(по умолчанию: 1234)</p>
        <div class="pin-dots" id="pin-dots">
          <div class="pin-dot" id="d0"></div>
          <div class="pin-dot" id="d1"></div>
          <div class="pin-dot" id="d2"></div>
          <div class="pin-dot" id="d3"></div>
        </div>
        <div class="pin-keypad" id="pin-keypad">
          <button class="pin-key" onclick="pinPress('1')">1</button>
          <button class="pin-key" onclick="pinPress('2')">2</button>
          <button class="pin-key" onclick="pinPress('3')">3</button>
          <button class="pin-key" onclick="pinPress('4')">4</button>
          <button class="pin-key" onclick="pinPress('5')">5</button>
          <button class="pin-key" onclick="pinPress('6')">6</button>
          <button class="pin-key" onclick="pinPress('7')">7</button>
          <button class="pin-key" onclick="pinPress('8')">8</button>
          <button class="pin-key" onclick="pinPress('9')">9</button>
          <button class="pin-key" onclick="pinPress('')" style="font-size:14px;color:var(--text-dim)">—</button>
          <button class="pin-key" onclick="pinPress('0')">0</button>
          <button class="pin-key" onclick="pinBackspace()" style="font-size:14px;">⌫</button>
        </div>
        <div class="pin-error" id="pin-error"></div>
      </div>
    </div>
  </div>

  <!-- ITEM EDIT MODAL -->
  <div class="modal-overlay" id="item-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="item-modal-title">Новая позиция</span>
        <button class="modal-close" onclick="closeModal('item-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Фотография</label>
          <div class="img-upload-area" id="img-upload-area" onclick="document.getElementById('img-file-input').click()">
            <img id="img-preview" src="" style="display:none">
            <div class="upload-hint">
              <span class="upload-icon">📷</span>
              <span class="upload-text">Нажмите чтобы выбрать фото</span>
            </div>
          </div>
          <input type="file" id="img-file-input" accept="image/*" onchange="handleImageUpload(event)">
        </div>
        <div class="form-group">
          <label class="form-label">Название *</label>
          <input class="form-input" id="field-name" type="text" placeholder="Например: Капучино">
        </div>
        <div class="form-group">
          <label class="form-label">Описание</label>
          <textarea class="form-textarea" id="field-desc"
            placeholder="Короткое описание вкуса или состава..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Цена (₽) *</label>
          <input class="form-input" id="field-price" type="number" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Категория</label>
          <select class="form-input" id="field-category"></select>
        </div>
        <div class="form-group">
          <label class="form-label" style="margin-bottom:10px;">Модификаторы <span
              style="color:var(--text-dim);font-weight:400;">(размеры, добавки…)</span></label>
          <div class="mod-editor" id="mod-editor-container"></div>
          <button class="mod-add-group-btn" onclick="modAddGroup()">+ Добавить группу модификаторов</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('item-modal')">Отмена</button>
        <button class="btn btn-primary" onclick="saveItem()">💾 Сохранить</button>
      </div>
    </div>
  </div>

  <!-- CATEGORY MODAL -->
  <div class="modal-overlay" id="cat-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">📂 Управление категориями</span>
        <button class="modal-close" onclick="closeModal('cat-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="cat-list" id="cat-list"></div>
        <button class="btn btn-secondary" onclick="addCategoryInput()" style="width:100%">+ Добавить категорию</button>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('cat-modal')">Отмена</button>
        <button class="btn btn-primary" onclick="saveCategories()">💾 Сохранить</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM DELETE MODAL -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal confirm-modal">
      <div class="modal-body" style="padding: 28px 24px 20px;">
        <div class="confirm-icon">🗑️</div>
        <div class="confirm-text" id="confirm-text">Удалить позицию?</div>
        <div class="confirm-sub" id="confirm-sub">Это действие нельзя отменить</div>
      </div>
      <div class="modal-footer" style="justify-content:center;gap:14px;">
        <button class="btn btn-secondary" onclick="closeModal('confirm-modal')">Отмена</button>
        <button class="btn btn-danger" id="confirm-ok-btn">Удалить</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">⚙️ Настройки</span>
        <button class="modal-close" onclick="closeModal('settings-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Название заведения</label>
          <input class="form-input" id="setting-cafe-name" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">PIN-код администратора (4 цифры)</label>
          <input class="form-input" id="setting-pin" type="password" maxlength="4" placeholder="••••">
        </div>
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px;">
          <button class="btn btn-primary" onclick="exportToFile()" style="width:100%;justify-content:center;">💾 Сохранить в файл (со всеми данными)</button>
          <button class="btn btn-danger" onclick="confirmReset()" style="width:100%;justify-content:center;">⚠️ Сбросить все данные</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('settings-modal')">Отмена</button>
        <button class="btn btn-primary" onclick="saveSettings()">💾 Сохранить</button>
      </div>
    </div>
  </div>

  <script>
    // ===== DATA =====
    const DEFAULT_DATA = {
      cafeName: 'Кофейня',
      pin: '1234',
      categories: ['Кофе', 'Чай', 'Напитки', 'Десерты', 'Закуски'],
      items: [
        { id: 1, name: 'Капучино', desc: 'Нежный кофе с молочной пенкой. Идеальный баланс эспрессо и молока.', price: 250, category: 'Кофе', img: '' },
        { id: 2, name: 'Латте', desc: 'Мягкий сливочный кофе. Больше молока, деликатный вкус.', price: 280, category: 'Кофе', img: '' },
        { id: 3, name: 'Американо', desc: 'Классический чёрный кофе. Насыщенный и ароматный.', price: 180, category: 'Кофе', img: '' },
        { id: 4, name: 'Раф кофе', desc: 'Эспрессо, сливки и ваниль — взбитые вместе. Бархатистый вкус.', price: 320, category: 'Кофе', img: '' },
        { id: 5, name: 'Матча латте', desc: 'Японский зелёный чай с молоком. Нежная горчинка и сладость.', price: 290, category: 'Чай', img: '' },
        { id: 6, name: 'Чай ароматный', desc: 'Авторский купаж с фруктами и травами. Согревает и радует.', price: 200, category: 'Чай', img: '' },
        { id: 7, name: 'Лимонад', desc: 'Свежий домашний лимонад с мятой и цитрусом.', price: 220, category: 'Напитки', img: '' },
        { id: 8, name: 'Смузи', desc: 'Микс ягод и фруктов. Натуральный и витаминный.', price: 310, category: 'Напитки', img: '' },
        { id: 9, name: 'Тирамису', desc: 'Классический итальянский десерт с маскарпоне и кофе.', price: 350, category: 'Десерты', img: '' },
        { id: 10, name: 'Чизкейк', desc: 'Нежный сливочный чизкейк на песочной основе.', price: 320, category: 'Десерты', img: '' },
      ]
    };

    const CATEGORY_ICONS = {
      'Кофе': '☕', 'Чай': '🍵', 'Напитки': '🥤', 'Десерты': '🍰',
      'Закуски': '🥐', 'Завтраки': '🍳', 'Обеды': '🍽️', 'Выпечка': '🧁',
      'Коктейли': '🍹', 'Вино': '🍷', 'Пиво': '🍺', 'Еда': '🍴',
    };

    let data = loadData();
    let currentCategory = 'all';
    let currentMode = 'view'; // 'view' | 'edit'
    let editingItemId = null;
    let tempImageData = null;
    let tempModGroups = [];   // временные модификаторы при редактировании
    let pinBuffer = '';
    let detailBasePrice = 0;  // базовая цена открытого блюда

    function loadData() {
      try {
        const saved = localStorage.getItem('coffee_menu_data');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (!parsed.categoryIcons) parsed.categoryIcons = { ...CATEGORY_ICONS };
          return parsed;
        }
      } catch (e) { }
      const def = JSON.parse(JSON.stringify(DEFAULT_DATA));
      def.categoryIcons = { ...CATEGORY_ICONS };
      return def;
    }

    function saveData() {
      try { localStorage.setItem('coffee_menu_data', JSON.stringify(data)); } catch (e) { }
    }

    // ===== MODE =====
    function switchMode(mode) {
      currentMode = mode;
      document.getElementById('btn-view-mode').classList.toggle('active', mode === 'view');
      document.getElementById('btn-edit-mode').classList.toggle('active', mode === 'edit');
      const badge = document.getElementById('mode-badge');
      if (mode === 'edit') {
        badge.textContent = 'Редактор';
        badge.className = 'mode-badge edit';
        document.body.classList.add('edit-mode');
      } else {
        badge.textContent = 'Просмотр';
        badge.className = 'mode-badge view';
        document.body.classList.remove('edit-mode');
      }
      renderTabs();
      renderGrid();
    }

    function requestEditMode() {
      if (currentMode === 'edit') { switchMode('view'); return; }
      openModal('pin-modal');
      pinBuffer = '';
      updatePinDots();
      document.getElementById('pin-error').textContent = '';
    }

    // ===== PIN =====
    function pinPress(digit) {
      if (!digit) return;
      if (pinBuffer.length >= 4) return;
      pinBuffer += digit;
      updatePinDots();
      if (pinBuffer.length === 4) {
        setTimeout(checkPin, 100);
      }
    }
    function pinBackspace() {
      pinBuffer = pinBuffer.slice(0, -1);
      updatePinDots();
      document.getElementById('pin-error').textContent = '';
    }
    function updatePinDots() {
      for (let i = 0; i < 4; i++) {
        document.getElementById('d' + i).classList.toggle('filled', i < pinBuffer.length);
      }
    }
    function checkPin() {
      if (pinBuffer === data.pin) {
        closeModal('pin-modal');
        switchMode('edit');
        showToast('✏️ Режим редактирования включён', 'success');
      } else {
        document.getElementById('pin-error').textContent = 'Неверный PIN-код';
        pinBuffer = '';
        updatePinDots();
      }
    }

    // ===== TABS =====
    function renderTabs() {
      const container = document.getElementById('tabs-container');
      const cats = ['all', ...data.categories];
      let html = '';
      cats.forEach(cat => {
        const label = cat === 'all' ? '✨ Всё меню' : (data.categoryIcons[cat] || CATEGORY_ICONS[cat] || '📋') + ' ' + cat;
        const active = currentCategory === cat ? 'active' : '';
        html += `<button class="tab ${active}" onclick="selectCategory('${cat}')">${label}</button>`;
      });
      if (currentMode === 'edit') {
        html += `<button class="tab-add-btn" onclick="openCatModal()" title="Управление категориями">⚙</button>`;
        // Settings button
        html += `<button class="tab-add-btn" onclick="openSettingsModal()" title="Настройки" style="font-size:16px">⚙️</button>`;
      }
      container.innerHTML = html;
    }

    function selectCategory(cat) {
      currentCategory = cat;
      renderTabs();
      renderGrid();
    }

    // ===== GRID =====
    function renderGrid() {
      const grid = document.getElementById('menu-grid');
      const filtered = currentCategory === 'all'
        ? data.items
        : data.items.filter(i => i.category === currentCategory);

      let html = '';
      filtered.forEach(item => {
        html += renderCard(item);
      });

      if (currentMode === 'edit') {
        html += `<div class="card-add" onclick="openItemModal(null, currentCategory !== 'all' ? currentCategory : '')">
      <span class="plus">+</span>
      <span class="label">Добавить позицию</span>
    </div>`;
      }

      if (filtered.length === 0 && currentMode !== 'edit') {
        html = `<div class="empty-state">
      <div class="emoji">☕</div>
      <p>В этой категории пока нет позиций</p>
      <p style="font-size:13px">Переключитесь в режим редактирования чтобы добавить</p>
    </div>`;
      }

      grid.innerHTML = html;
    }

    function renderCard(item) {
      const imgHtml = item.img
        ? `<img class="card-img" src="${item.img}" alt="${escHtml(item.name)}" loading="lazy">`
        : `<div class="card-img-placeholder">${data.categoryIcons[item.category] || CATEGORY_ICONS[item.category] || '🍽️'}</div>`;

      return `<div class="menu-card" id="card-${item.id}" onclick="if (currentMode !== 'edit') openDetailModal(${item.id})">
    ${imgHtml}
    <div class="card-edit-actions">
      <button class="card-edit-btn btn-edit-item" onclick="openItemModal(${item.id})" title="Редактировать">✏</button>
      <button class="card-edit-btn btn-delete-item" onclick="confirmDeleteItem(${item.id})" title="Удалить">✕</button>
    </div>
    <div class="card-body">
      <div class="card-title">${escHtml(item.name)}</div>
      <div class="card-desc">${escHtml(item.desc)}</div>
      <div class="card-price">${item.price}<span>₽</span></div>
    </div>
  </div>`;
    }

    // ===== DETAIL MODAL =====
    function openDetailModal(id) {
      const item = data.items.find(i => i.id === id);
      if (!item) return;

      detailBasePrice = item.price;
      document.getElementById('detail-modal-title').textContent = item.name;
      const imgEl = document.getElementById('detail-img');
      const placeholderEl = document.getElementById('detail-placeholder');

      if (item.img) {
        imgEl.src = item.img;
        imgEl.style.display = 'block';
        placeholderEl.style.display = 'none';
      } else {
        imgEl.style.display = 'none';
        placeholderEl.textContent = data.categoryIcons[item.category] || CATEGORY_ICONS[item.category] || '🍽️';
        placeholderEl.style.display = 'flex';
      }

      document.getElementById('detail-desc').textContent = item.desc;
      renderDetailMods(item);
      updateDetailTotal();
      openModal('detail-modal');
    }

    // Рендер секции модификаторов в detail-modal
    function renderDetailMods(item) {
      const modsEl = document.getElementById('detail-mods');
      const groups = item.modifierGroups || [];
      if (!groups.length) { modsEl.innerHTML = ''; return; }
      modsEl.innerHTML = groups.map((g, gi) => {
        const reqBadge = g.required ? '<span class="req-badge">обязательно</span>' : '';
        const chips = g.options.map((opt, oi) => {
          const priceStr = opt.price > 0 ? `<span class="chip-price">+${opt.price}₽</span>` : (opt.price < 0 ? `<span class="chip-price">${opt.price}₽</span>` : '');
          const sel = oi === 0 && g.type === 'single' ? 'selected' : '';
          return `<div class="mod-chip ${sel}" data-group="${gi}" data-opt="${oi}" data-price="${opt.price}" data-type="${g.type}" onclick="chipToggle(this)">${escHtml(opt.name)}${priceStr}</div>`;
        }).join('');
        return `<div class="mod-group"><div class="mod-group-label">${escHtml(g.name)}${reqBadge}</div><div class="mod-chips">${chips}</div></div>`;
      }).join('');
    }

    function chipToggle(el) {
      const gi = el.dataset.group;
      const type = el.dataset.type;
      const chips = document.querySelectorAll(`.mod-chip[data-group="${gi}"]`);
      if (type === 'single') {
        chips.forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
      } else {
        el.classList.toggle('selected');
      }
      updateDetailTotal();
    }

    function updateDetailTotal() {
      let extra = 0;
      document.querySelectorAll('.mod-chip.selected').forEach(c => {
        extra += parseInt(c.dataset.price) || 0;
      });
      const total = detailBasePrice + extra;
      document.getElementById('detail-total').textContent = total + '₽';
    }

    // ===== ITEM MODAL =====
    function openItemModal(id, defaultCat) {
      editingItemId = id;
      tempImageData = null;

      const isNew = id === null;
      document.getElementById('item-modal-title').textContent = isNew ? '➕ Новая позиция' : '✏️ Редактировать';

      const item = isNew
        ? { name: '', desc: '', price: '', category: defaultCat || data.categories[0] || '', img: '', modifierGroups: [] }
        : data.items.find(i => i.id === id);

      document.getElementById('field-name').value = item.name;
      document.getElementById('field-desc').value = item.desc;
      document.getElementById('field-price').value = item.price;

      const sel = document.getElementById('field-category');
      sel.innerHTML = data.categories.map(c => {
        const icon = (data.categoryIcons && data.categoryIcons[c]) ? data.categoryIcons[c] : (CATEGORY_ICONS[c] || '📋');
        return `<option value="${c}" ${c === item.category ? 'selected' : ''}>${icon} ${c}</option>`;
      }).join('');

      const preview = document.getElementById('img-preview');
      const area = document.getElementById('img-upload-area');
      if (item.img) {
        preview.src = item.img;
        preview.style.display = 'block';
        area.classList.add('has-img');
      } else {
        preview.src = '';
        preview.style.display = 'none';
        area.classList.remove('has-img');
      }
      tempImageData = item.img || null;

      // Загрузить модификаторы
      tempModGroups = JSON.parse(JSON.stringify(item.modifierGroups || []));
      modRenderEditor();

      openModal('item-modal');
      setTimeout(() => document.getElementById('field-name').focus(), 300);
    }

    function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        tempImageData = ev.target.result;
        const preview = document.getElementById('img-preview');
        preview.src = tempImageData;
        preview.style.display = 'block';
        document.getElementById('img-upload-area').classList.add('has-img');
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    }

    // ===== MODIFIER EDITOR =====
    function modRenderEditor() {
      const container = document.getElementById('mod-editor-container');
      container.innerHTML = tempModGroups.map((g, gi) => {
        const reqClass = g.required ? 'on' : '';
        const reqLabel = g.required ? 'Обязат.' : 'Не обяз.';
        const options = (g.options || []).map((opt, oi) => `
          <div class="mod-option-row">
            <input type="text" placeholder="Название" value="${escHtml(opt.name)}" oninput="tempModGroups[${gi}].options[${oi}].name=this.value">
            <input type="number" placeholder="+цена" value="${opt.price}" oninput="tempModGroups[${gi}].options[${oi}].price=parseInt(this.value)||0">
            <button class="mod-del-opt" onclick="modDelOption(${gi},${oi})">✕</button>
          </div>`).join('');
        return `<div class="mod-editor-group">
          <div class="mod-editor-group-header">
            <input type="text" placeholder="Название группы" value="${escHtml(g.name)}" oninput="tempModGroups[${gi}].name=this.value">
            <div class="mod-type-toggle">
              <button class="mod-type-btn ${g.type === 'single' ? 'active' : ''}" onclick="modToggleType(${gi},'single')">Один</button>
              <button class="mod-type-btn ${g.type === 'multi' ? 'active' : ''}" onclick="modToggleType(${gi},'multi')">Неск.</button>
            </div>
            <button class="mod-req-toggle ${reqClass}" onclick="modToggleRequired(${gi})">${reqLabel}</button>
            <button class="mod-del-group" onclick="modDelGroup(${gi})">🗑</button>
          </div>
          <div class="mod-options">${options}</div>
          <button class="mod-add-opt" onclick="modAddOption(${gi})">+ Добавить вариант</button>
        </div>`;
      }).join('');
    }

    function modAddGroup() {
      tempModGroups.push({ id: Date.now(), name: '', type: 'single', required: false, options: [] });
      modRenderEditor();
      // фокус на последнем input
      const inputs = document.querySelectorAll('#mod-editor-container .mod-editor-group-header input');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }

    function modDelGroup(gi) {
      tempModGroups.splice(gi, 1);
      modRenderEditor();
    }

    function modAddOption(gi) {
      tempModGroups[gi].options.push({ id: Date.now(), name: '', price: 0 });
      modRenderEditor();
      const rows = document.querySelectorAll(`#mod-editor-container .mod-editor-group:nth-child(${gi + 1}) .mod-option-row input`);
      if (rows.length) rows[rows.length - 2].focus();
    }

    function modDelOption(gi, oi) {
      tempModGroups[gi].options.splice(oi, 1);
      modRenderEditor();
    }

    function modToggleType(gi, type) {
      tempModGroups[gi].type = type;
      modRenderEditor();
    }

    function modToggleRequired(gi) {
      tempModGroups[gi].required = !tempModGroups[gi].required;
      modRenderEditor();
    }

    function saveItem() {
      const name = document.getElementById('field-name').value.trim();
      const desc = document.getElementById('field-desc').value.trim();
      const price = parseInt(document.getElementById('field-price').value) || 0;
      const category = document.getElementById('field-category').value;

      if (!name) { showToast('⚠️ Введите название', 'error'); return; }

      // Очистить пустые группы/опции
      const mods = tempModGroups
        .map(g => ({ ...g, options: g.options.filter(o => o.name.trim()) }))
        .filter(g => g.name.trim() && g.options.length);

      if (editingItemId === null) {
        const newId = Date.now();
        data.items.push({ id: newId, name, desc, price, category, img: tempImageData || '', modifierGroups: mods });
        showToast('✅ Позиция добавлена');
      } else {
        const item = data.items.find(i => i.id === editingItemId);
        if (item) { item.name = name; item.desc = desc; item.price = price; item.category = category; item.img = tempImageData || ''; item.modifierGroups = mods; }
        showToast('✅ Изменения сохранены');
      }

      saveData();
      closeModal('item-modal');
      renderGrid();
    }

    // ===== DELETE =====
    function confirmDeleteItem(id) {
      const item = data.items.find(i => i.id === id);
      document.getElementById('confirm-text').textContent = `Удалить «${item ? item.name : 'позицию'}»?`;
      document.getElementById('confirm-sub').textContent = 'Это действие нельзя отменить';
      document.getElementById('confirm-ok-btn').onclick = () => deleteItem(id);
      openModal('confirm-modal');
    }

    function deleteItem(id) {
      data.items = data.items.filter(i => i.id !== id);
      saveData();
      closeModal('confirm-modal');
      renderGrid();
      showToast('🗑️ Позиция удалена');
    }

    // ===== CATEGORIES =====
    function openCatModal() {
      const list = document.getElementById('cat-list');
      list.innerHTML = data.categories.map((c, i) => `
    <div class="cat-item">
      <input type="hidden" class="cat-old-name" value="${escHtml(c)}">
      <input class="cat-icon-input" value="${data.categoryIcons[c] || CATEGORY_ICONS[c] || '📋'}" style="width:40px; text-align:center; padding:0; background:transparent; border:none; border-bottom:1px solid var(--border); border-radius:0; font-size:18px; color:var(--text);" placeholder="📋">
      <input class="cat-name-input" value="${escHtml(c)}" id="cat-input-${i}" placeholder="Название категории">
      <button class="cat-del" onclick="this.closest('.cat-item').remove()">✕</button>
    </div>`).join('');
      openModal('cat-modal');
    }

    function addCategoryInput() {
      const list = document.getElementById('cat-list');
      const div = document.createElement('div');
      div.className = 'cat-item';
      const idx = list.children.length;
      div.innerHTML = `
      <input type="hidden" class="cat-old-name" value="">
      <input class="cat-icon-input" value="📋" style="width:40px; text-align:center; padding:0; background:transparent; border:none; border-bottom:1px solid var(--border); border-radius:0; font-size:18px; color:var(--text);" placeholder="📋">
      <input class="cat-name-input" id="cat-input-${idx}" placeholder="Название категории">
      <button class="cat-del" onclick="this.closest('.cat-item').remove()">✕</button>`;
      list.appendChild(div);
      div.querySelector('.cat-name-input').focus();
    }

    function saveCategories() {
      const items = document.querySelectorAll('#cat-list .cat-item');
      const newCats = [];
      const newIcons = {};
      const renameMap = {};

      items.forEach(item => {
        const oldName = item.querySelector('.cat-old-name').value;
        const newName = item.querySelector('.cat-name-input').value.trim();
        const iconVal = item.querySelector('.cat-icon-input').value.trim() || '📋';

        if (newName) {
          newCats.push(newName);
          newIcons[newName] = iconVal;
          if (oldName && oldName !== newName) {
            renameMap[oldName] = newName;
          }
        }
      });

      if (!newCats.length) { showToast('⚠️ Добавьте хотя бы одну категорию', 'error'); return; }

      data.categories = newCats;
      data.categoryIcons = newIcons;

      data.items.forEach(item => {
        if (renameMap[item.category]) {
          item.category = renameMap[item.category];
        }
      });

      if (!newCats.includes(currentCategory) && currentCategory !== 'all') {
        currentCategory = renameMap[currentCategory] || 'all';
      }

      saveData();
      closeModal('cat-modal');
      renderTabs();
      renderGrid();
      showToast('✅ Категории сохранены');
    }

    // ===== SETTINGS =====
    function openSettingsModal() {
      document.getElementById('setting-cafe-name').value = data.cafeName;
      document.getElementById('setting-pin').value = '';
      openModal('settings-modal');
    }

    function saveSettings() {
      const name = document.getElementById('setting-cafe-name').value.trim();
      const pin = document.getElementById('setting-pin').value.trim();
      if (name) { data.cafeName = name; document.getElementById('cafe-name').textContent = name; }
      if (pin) {
        if (!/^\d{4}$/.test(pin)) { showToast('⚠️ PIN должен быть 4 цифры', 'error'); return; }
        data.pin = pin;
      }
      saveData();
      closeModal('settings-modal');
      showToast('✅ Настройки сохранены');
    }

    function confirmReset() {
      document.getElementById('confirm-text').textContent = 'Сбросить все данные?';
      document.getElementById('confirm-sub').textContent = 'Все позиции меню и настройки будут удалены';
      document.getElementById('confirm-ok-btn').onclick = () => {
        localStorage.removeItem('coffee_menu_data');
        data = JSON.parse(JSON.stringify(DEFAULT_DATA));
        data.categoryIcons = { ...CATEGORY_ICONS };
        closeModal('confirm-modal');
        closeModal('settings-modal');
        document.getElementById('cafe-name').textContent = data.cafeName;
        currentCategory = 'all';
        renderTabs();
        renderGrid();
        showToast('♻️ Данные сброшены');
      };
      openModal('confirm-modal');
    }

    // ===== EXPORT TO FILE =====
    function exportToFile() {
      // Сериализуем текущие данные
      const dataStr = JSON.stringify(data, null, 4);

      // Получаем HTML страницы
      let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

      // Заменяем блок DEFAULT_DATA на актуальные данные
      // Маркер: от "const DEFAULT_DATA = {" до закрывающего "};" на отдельной строке
      html = html.replace(
        /const DEFAULT_DATA = \{[\s\S]*?\n    \};/,
        'const DEFAULT_DATA = ' + dataStr + ';'
      );

      // Скачиваем файл
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'index.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('💾 Файл сохранён с данными', 'success');
    }

    // ===== MODAL HELPERS =====
    function openModal(id) {
      document.getElementById(id).classList.add('open');
    }
    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    // close on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', e => {
        if (e.target === overlay) closeModal(overlay.id);
      });
    });

    // ===== TOAST =====
    let toastTimer;
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (type ? ' ' + type : '');
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ===== SCROLL TOP =====
    const mainEl = document.getElementById('main-content');
    mainEl.addEventListener('scroll', () => {
      document.getElementById('scroll-top-btn').classList.toggle('visible', mainEl.scrollTop > 200);
    });
    function scrollToTop() { mainEl.scrollTo({ top: 0, behavior: 'smooth' }); }

    // ===== UTILS =====
    function escHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ===== INIT =====
    document.getElementById('cafe-name').textContent = data.cafeName;
    switchMode('view');

    // ===== EMOJI ANIMATION =====
    const foodEmojis = ['☕', '🍵', '🥤', '🍰', '🥐', '🍳', '🍽️', '🧁', '🍹', '🍴', '🍕', '🍔', '🍟', '🌭', '🥗', '🍩', '🍪', '🍦', '🥪', '🌮'];
    let currentEmojiIdx = 0;
    const headerCup = document.getElementById('header-cup');
    setInterval(() => {
      headerCup.classList.add('animating');
      setTimeout(() => {
        currentEmojiIdx = (currentEmojiIdx + 1) % foodEmojis.length;
        headerCup.textContent = foodEmojis[currentEmojiIdx];
        headerCup.classList.remove('animating');
      }, 300); // Wait for fade out
    }, 3000);

    // Register SW for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => { });
    }
  </script>
</body>

</html>
